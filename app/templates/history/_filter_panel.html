<div class="filter-panel">
  <div class="form-group">
    <label class="form-label" for="filter-bean">Bean</label>
    <select id="filter-bean" name="bean_id" class="form-input"
      hx-get="/history/shots" hx-target="#shot-list" hx-swap="innerHTML"
      hx-include="[name='min_taste']">
      <option value="">All beans</option>
      {% for bean in beans %}
      <option value="{{ bean.id }}" {{ 'selected' if filter_bean_id == bean.id else '' }}>
        {{ bean.name }}
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label class="form-label" for="filter-taste">Min Taste Score</label>
    <select id="filter-taste" name="min_taste" class="form-input"
      hx-get="/history/shots" hx-target="#shot-list" hx-swap="innerHTML"
      hx-include="[name='bean_id']">
      <option value="">Any</option>
      {% for score in [5, 6, 7, 8, 9] %}
      <option value="{{ score }}" {{ 'selected' if filter_min_taste == score else '' }}>
        ≥ {{ score }}
      </option>
      {% endfor %}
    </select>
  </div>
</div>
