{% if shots %}
  {% for shot in shots %}
    {% include "history/_shot_row.html" %}
  {% endfor %}
{% else %}
  <div class="empty-state">
    <div class="empty-state-title">No shots found</div>
    <div class="empty-state-text">
      {% if filter_bean_id or filter_min_taste %}
        Try adjusting your filters.
      {% else %}
        Start brewing to see your history here.
      {% endif %}
    </div>
  </div>
{% endif %}
