<div class="shot-row card mb-sm" id="shot-{{ shot.id }}"
  hx-get="/history/{{ shot.id }}" hx-target="#shot-modal-container" hx-swap="innerHTML">
  <div class="shot-row-header">
    <span class="shot-date">{{ shot.created_at.strftime('%b %d, %H:%M') }}</span>
    <span class="shot-meta">
      {% if shot.is_failed %}<span class="badge badge-failed">Failed</span>{% endif %}
      {% if shot.notes %}<span class="shot-notes-icon" title="Has notes">📝</span>{% endif %}
    </span>
  </div>
  <div class="shot-row-body">
    <span class="shot-taste {% if shot.is_failed %}text-danger{% endif %}">
      {{ shot.taste }}/10
    </span>
    <span class="shot-grind text-secondary">Grind {{ shot.grind_setting }}</span>
    <span class="shot-bean text-muted text-sm">{{ shot.bean_name }}</span>
  </div>
</div>
